<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>サンプルHTMLページ</title>
</head>
<body>


<input type="text" id="ime-input" placeholder="ここに入力...">
<p>未確定: <span id="composition-view"></span></p>
<p>確定済: <span id="committed-view"></span></p>

<script>
  const inputEl = document.getElementById('ime-input');
  const compView = document.getElementById('composition-view');
  const commView = document.getElementById('committed-view');

  let isComposing = false; // IME入力中かどうかのフラグ

  // 1. IME入力開始
  inputEl.addEventListener('compositionstart', (e) => {
    isComposing = true;
    console.log('Start', e.data);
  });

  // 2. IME入力・更新（変換候補の選択など）
  inputEl.addEventListener('compositionupdate', (e) => {
    // e.data で現在の未確定文字列を取得
    compView.textContent = e.data;
    console.log('Update', e.data);
  });

  // 3. 入力イベント
  inputEl.addEventListener('input', (e) => {
    // IME確定後はisComposingがfalseになる
    if (!isComposing) {
      commView.textContent = e.target.value;
      compView.textContent = ''; // 未確定表示を消す
      console.log('Committed', e.target.value);
    }
  });

  // 4. IME入力終了（確定）
  inputEl.addEventListener('compositionend', (e) => {
    isComposing = false;
    compView.textContent = '';
    commView.textContent = e.target.value;
    console.log('End', e.data);
  });
</script>
</body>
</html>
